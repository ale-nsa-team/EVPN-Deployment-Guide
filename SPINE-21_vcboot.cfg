!========================================!
! File: /flash/working/vcboot.cfg        !
!========================================!
! Chassis:
system name "SPINE-21"

! Configuration:
configuration error-file-limit 2

! Capability Manager:
! Virtual Flow Control:
! LFP: 
! Interface:
! Port_Manager: 
! Link Aggregate:
! VLAN:
vlan 1 admin-state enable
vlan 999 admin-state disable
vlan 999 name "BLOCKING"
vlan 999 members port 1/1/7-24 untagged

! PVLAN:
! Spanning Tree:
spantree vlan 1 admin-state enable 
spantree vlan 999 admin-state enable 
spantree vlan 3191 admin-state disable 
spantree vlan 3192 admin-state disable 
spantree vlan 3193 admin-state disable 
spantree vlan 3194 admin-state disable 
spantree vlan 3195 admin-state disable 
spantree vlan 3196 admin-state disable 

! DA-UNP:
unp profile "devProfPrinter" 
unp profile "devProfWindows" 
unp profile "devProfIP-Phone" 
unp profile "devProfWireless-Router" 
unp profile "devProfSmartPhone/PDA/Tablets" 
unp classification-rule "devProfPrinter"
unp classification-rule "devProfPrinter" precedence 255
unp classification-rule "devProfPrinter" Profile1 "devProfPrinter"
unp classification-rule "devProfPrinter" device-type "Printer"
unp classification-rule "devProfWindows"
unp classification-rule "devProfWindows" precedence 255
unp classification-rule "devProfWindows" Profile1 "devProfWindows"
unp classification-rule "devProfWindows" device-type "Windows"
unp classification-rule "devProfIP-Phone"
unp classification-rule "devProfIP-Phone" precedence 255
unp classification-rule "devProfIP-Phone" Profile1 "devProfIP-Phone"
unp classification-rule "devProfIP-Phone" device-type "IP-Phone"
unp classification-rule "devProfWireless-Router"
unp classification-rule "devProfWireless-Router" precedence 255
unp classification-rule "devProfWireless-Router" Profile1 "devProfWireless-Router"
unp classification-rule "devProfWireless-Router" device-type "Wireless-Router"
unp classification-rule "devProfSmartPhone/PDA/Tablets"
unp classification-rule "devProfSmartPhone/PDA/Tablets" precedence 255
unp classification-rule "devProfSmartPhone/PDA/Tablets" Profile1 "devProfSmartPhone/PDA/Tablets"
unp classification-rule "devProfSmartPhone/PDA/Tablets" device-type "SmartPhone/PDA/Tablets"

! Bridging:
! Port Mirroring:
! Port Mapping:
! IP:
ip interface "Loopback0" address 10.99.99.21 
ip interface "SP21-LF31" address 10.99.1.11 mask 255.255.255.254 vlan 3191 rtr-port port 1/1/1 tagged ifindex 1
ip interface "SP21-LF32" address 10.99.1.13 mask 255.255.255.254 vlan 3192 rtr-port port 1/1/2 tagged ifindex 2
ip interface "SP21-LF33" address 10.99.1.15 mask 255.255.255.254 vlan 3193 rtr-port port 1/1/3 tagged ifindex 3
ip interface "SP21-LF34" address 10.99.1.17 mask 255.255.255.254 vlan 3194 rtr-port port 1/1/4 tagged ifindex 4
ip interface "SP21-LF35" address 10.99.1.19 mask 255.255.255.254 vlan 3195 rtr-port port 1/1/5 tagged ifindex 5
ip interface "SP21-LF36" address 10.99.1.21 mask 255.255.255.254 vlan 3196 rtr-port port 1/1/6 tagged ifindex 6
ssh strong-ciphers enable
ssh strong-hmacs enable

! IPv6:
! IPSec:
! IPMS:
! AAA:
aaa authentication default "local" 
aaa authentication console "local" 
aaa authentication http "local" 
aaa authentication snmp "local" 
aaa tacacs command-authorization disable
user ovngv3_sha_aes allow-ssh disable

! NTP:
ntp server 10.255.215.200
ntp server 10.255.10.80
ntp client admin-state enable

! TCAM Manager:
! QOS:
! Policy Manager:
! VLAN Stacking:
! ERP:
! MVRP:
! LLDP:
lldp nearest-bridge chassis tlv management port-description enable system-name enable system-description enable
lldp nearest-bridge chassis tlv management management-address enable
lldp nearest-bridge chassis tlv dot1 vlan-name enable port-vlan enable

! UDLD:
! Server Load Balance:
! High Availability Vlan:
! Session Manager:
session cli timeout 5555
session prompt default "SPINE-21->"
command-log enable

! Web:
! Trap Manager:
snmp station 143.209.0.2 31162 "ovngv3_sha_aes" v3 enable
snmp-trap filter-ip 143.209.0.2 5 6 7 8 9 10
snmp-trap filter-ip 143.209.0.2 11 12 13 14 16 17
snmp-trap filter-ip 143.209.0.2 18 19 20 21 22 23
snmp-trap filter-ip 143.209.0.2 24 25 26 27 28 29
snmp-trap filter-ip 143.209.0.2 109 110 111 112 113 114
snmp-trap filter-ip 143.209.0.2 115 116 117 118 119 120
snmp-trap filter-ip 143.209.0.2 121 122 123 124 125 126
snmp-trap filter-ip 143.209.0.2 127 128 129 130 131 132
snmp-trap filter-ip 143.209.0.2 210 211 212 213 214 215
snmp-trap filter-ip 143.209.0.2 216 217 218 219 220 221
snmp-trap filter-ip 143.209.0.2 222 223 224 225 226 227
snmp-trap filter-ip 143.209.0.2 228 229 230 231 232 233

! Health Monitor:
health threshold memory 80

! System Service:
system timezone PST

! SNMP:
snmp authentication-trap enable

! BFD:
ip bfd transmit 200
ip bfd receive 200
ip bfd echo-interval 200
ip bfd interface "SP21-LF31" 
ip bfd interface "SP21-LF31" admin-state enable
ip bfd interface "SP21-LF32" 
ip bfd interface "SP21-LF32" admin-state enable
ip bfd interface "SP21-LF33" 
ip bfd interface "SP21-LF33" admin-state enable
ip bfd interface "SP21-LF34" 
ip bfd interface "SP21-LF34" admin-state enable
ip bfd interface "SP21-LF35" 
ip bfd interface "SP21-LF35" admin-state enable
ip bfd interface "SP21-LF36" 
ip bfd interface "SP21-LF36" admin-state enable
ip bfd admin-state enable

! IP Route Manager:
ip router router-id 10.99.99.21
ip static-route 10.44.0.0/14 gateway 10.255.219.254 metric 1 
ip static-route 10.255.0.0/16 gateway 10.255.219.254 metric 1 

! VRRP:
! UDP Relay:
! RIP:
! OSPF:
ip load ospf
debug ip ospf set subsecond 1
debug ip ospf set bfdsubsecond 1
ip ospf area 0.0.0.0
ip ospf interface "SP21-LF31"
ip ospf interface "SP21-LF31" area 0.0.0.0
ip ospf interface "SP21-LF31" type point-to-point
ip ospf interface "SP21-LF31" bfd-state enable
ip ospf interface "SP21-LF31" admin-state enable 
ip ospf interface "SP21-LF32"
